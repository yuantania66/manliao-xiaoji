name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  launch-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run launch checks
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/manliao_xiaoji_ci
        run: npm run check:launch
