name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  launch-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: manliao_xiaoji_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d manliao_xiaoji_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/manliao_xiaoji_ci
        run: npx prisma migrate deploy

      - name: Run launch checks
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/manliao_xiaoji_ci
        run: npm run check:launch
